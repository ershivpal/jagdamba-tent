/* ---------- Reveal-on-scroll hook ---------- */
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('in'); obs.unobserve(el); }
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}
function Reveal({ children, className = "", delay = 0 }) {
  const ref = useReveal();
  return <div ref={ref} className={`reveal ${className}`} style={{ transitionDelay: `${delay}ms` }}>{children}</div>;
}

/* ---------- Mobile app-style bottom navigation ---------- */
function BottomNav() {
  const items = [
    { id: "top",      label: "Home",     icon: Icon.home },
    { id: "services", label: "Services", icon: Icon.tent },
    { id: "gallery",  label: "Gallery",  icon: Icon.image },
    { id: "videos",   label: "Videos",   icon: Icon.play },
    { id: "contact",  label: "Contact",  icon: Icon.pin },
  ];
  const [active, setActive] = useState("top");

  useEffect(() => {
    const sections = items
      .map(it => document.getElementById(it.id))
      .filter(Boolean);
    if (!sections.length) return;
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) setActive(entry.target.id);
      });
    }, { rootMargin: "-45% 0px -45% 0px", threshold: 0 });
    sections.forEach(s => obs.observe(s));
    return () => obs.disconnect();
  }, []);

  return (
    <nav className="md:hidden fixed bottom-0 inset-x-0 z-50 bg-ivory border-t border-gold/40 shadow-[0_-4px_16px_rgba(0,0,0,0.08)]"
         style={{ paddingBottom: "env(safe-area-inset-bottom)" }}>
      <div className="grid grid-cols-5">
        {items.map((it) => {
          const isActive = active === it.id;
          return (
            <a key={it.id} href={`#${it.id}`}
               className={`flex flex-col items-center justify-center gap-0.5 py-2.5 transition-colors ${isActive ? 'text-maroon' : 'text-charcoal/50'}`}>
              <span className={isActive ? 'scale-110 transition-transform' : 'transition-transform'}>{it.icon("w-5 h-5")}</span>
              <span className="text-[11px] font-utility font-semibold">{it.label}</span>
              {isActive && <span className="w-1.5 h-1.5 rounded-full bg-marigold mt-0.5"></span>}
            </a>
          );
        })}
      </div>
      <a href={waLink("Namaste, mujhe Jagdamba Tent House se booking ki jaankari chahiye.")}
         target="_blank" rel="noopener noreferrer" aria-label="Chat on WhatsApp"
         className="absolute -top-6 right-4 bg-[#25D366] text-white rounded-full p-3.5 shadow-lg border-4 border-ivory">
        {Icon.whatsapp("w-6 h-6")}
      </a>
    </nav>
  );
}
